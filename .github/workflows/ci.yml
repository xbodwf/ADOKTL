name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true
  JAVA_VERSION: "17"

jobs:
  android:
    name: Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/cache
          key: ${{ runner.os }}-gradle-android-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-android-
            ${{ runner.os }}-gradle-

      - name: Build Android Debug APK
        run: chmod +x gradlew && ./gradlew :platform:android:app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adoktl-android-debug
          path: platform/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  desktop-jvm:
    name: Desktop JVM (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-jvm-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-jvm-
            ${{ runner.os }}-gradle-

      - name: Compile desktop JVM
        run: chmod +x gradlew && ./gradlew :platform:desktop:compileKotlinJvm --stacktrace

      - name: Build desktop distributable
        run: ./gradlew :platform:desktop:createDistributable --stacktrace

      - name: Upload distributable artifact
        uses: actions/upload-artifact@v4
        with:
          name: adoktl-desktop-jvm
          path: platform/desktop/build/compose/binaries/main/distributable/
          retention-days: 7

  desktop-linux:
    name: Desktop Linux (compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-linuxX64-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-linuxX64-
            ${{ runner.os }}-gradle-

      - name: Compile desktop linuxX64
        run: chmod +x gradlew && ./gradlew :platform:desktop:compileKotlinLinuxX64 --stacktrace

  desktop-windows:
    name: Desktop Windows (compile)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mingwX64-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-mingwX64-
            ${{ runner.os }}-gradle-

      - name: Compile desktop mingwX64
        run: ./gradlew.bat :platform:desktop:compileKotlinMingwX64 --stacktrace

  core-check:
    name: Core library check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-core-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-core-
            ${{ runner.os }}-gradle-

      - name: Compile core + render + ui
        run: chmod +x gradlew && ./gradlew :core:compileKotlinJvm :render:compileKotlinJvm :ui:compileKotlinJvm --stacktrace